name: Tests 

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4


      - name: installation de python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11
          cache: "pip"

          -name: installation des dépendances
          run: | pip install -r requirements.txt

          -name: run tests
           run: pytest -v 